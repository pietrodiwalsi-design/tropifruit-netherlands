<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TropiFruit – Premium Philippine Dried Fruits | Netherlands</title>
  <meta name="description" content="Premium Philippine dried tropical fruits imported directly to the Netherlands. Clean label, sustainable, subscription-based." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --mango: #F5A623;
      --mango-dark: #D4871A;
      --mango-light: #FFF3DC;
      --green: #2D6A4F;
      --green-light: #52B788;
      --green-pale: #D8F3DC;
      --dark: #1A1A2E;
      --dark2: #16213E;
      --white: #FFFFFF;
      --gray: #6B7280;
      --light: #F9FAFB;
      --border: #E5E7EB;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      color: var(--dark);
      background: var(--white);
      line-height: 1.6;
    }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 5%;
      display: flex; align-items: center; justify-content: space-between;
      height: 68px;
    }
    .nav-logo {
      display: flex; align-items: center; gap: 10px;
      font-size: 1.4rem; font-weight: 800; color: var(--dark);
      text-decoration: none;
    }
    .nav-logo span { color: var(--mango); }
    .nav-logo .icon { font-size: 1.6rem; }
    .nav-links {
      display: flex; gap: 32px; list-style: none;
    }
    .nav-links a {
      text-decoration: none; color: var(--gray);
      font-size: 0.9rem; font-weight: 500;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--dark); }
    .nav-cta {
      background: var(--mango); color: white;
      padding: 10px 22px; border-radius: 8px;
      font-size: 0.9rem; font-weight: 600;
      text-decoration: none; transition: background 0.2s;
    }
    .nav-cta:hover { background: var(--mango-dark); }

    /* HERO */
    .hero {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 40%, #0F3460 100%);
      display: flex; align-items: center;
      padding: 100px 5% 60px;
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; top: -50%; right: -10%;
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(245,166,35,0.15) 0%, transparent 70%);
      border-radius: 50%;
    }
    .hero::after {
      content: '';
      position: absolute; bottom: -30%; left: -5%;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(82,183,136,0.1) 0%, transparent 70%);
      border-radius: 50%;
    }
    .hero-inner {
      max-width: 1200px; margin: 0 auto; width: 100%;
      display: grid; grid-template-columns: 1fr 1fr; gap: 60px;
      align-items: center; position: relative; z-index: 1;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(245,166,35,0.15); border: 1px solid rgba(245,166,35,0.3);
      color: var(--mango); padding: 6px 14px; border-radius: 50px;
      font-size: 0.8rem; font-weight: 600; letter-spacing: 0.5px;
      margin-bottom: 24px;
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 4vw, 3.5rem);
      color: white; line-height: 1.2; margin-bottom: 20px;
    }
    .hero h1 em { color: var(--mango); font-style: normal; }
    .hero p {
      font-size: 1.1rem; color: rgba(255,255,255,0.75);
      margin-bottom: 36px; max-width: 480px; line-height: 1.8;
    }
    .hero-btns { display: flex; gap: 14px; flex-wrap: wrap; }
    .btn-primary {
      background: var(--mango); color: white;
      padding: 14px 28px; border-radius: 10px;
      font-size: 1rem; font-weight: 700;
      text-decoration: none; transition: all 0.2s;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-primary:hover { background: var(--mango-dark); transform: translateY(-1px); }
    .btn-outline {
      border: 2px solid rgba(255,255,255,0.3); color: white;
      padding: 14px 28px; border-radius: 10px;
      font-size: 1rem; font-weight: 600;
      text-decoration: none; transition: all 0.2s;
    }
    .btn-outline:hover { border-color: white; }
    .hero-stats {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 2px; margin-top: 48px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; overflow: hidden;
    }
    .hero-stat {
      padding: 20px 16px;
      background: rgba(255,255,255,0.05);
      text-align: center;
    }
    .hero-stat .num {
      font-size: 1.6rem; font-weight: 800; color: var(--mango);
      display: block;
    }
    .hero-stat .lbl {
      font-size: 0.75rem; color: rgba(255,255,255,0.5);
      margin-top: 2px; display: block;
    }

    /* Hero visual */
    .hero-visual {
      display: flex; justify-content: center; align-items: center;
    }
    .hero-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px; padding: 32px;
      width: 100%; max-width: 380px;
      backdrop-filter: blur(10px);
    }
    .product-preview {
      background: linear-gradient(135deg, #F5A623 0%, #E8891A 100%);
      border-radius: 14px; height: 180px;
      display: flex; align-items: center; justify-content: center;
      font-size: 5rem; margin-bottom: 20px;
    }
    .hero-card h3 { color: white; font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; }
    .hero-card p { color: rgba(255,255,255,0.6); font-size: 0.85rem; margin-bottom: 16px; }
    .price-row {
      display: flex; justify-content: space-between; align-items: center;
    }
    .price { font-size: 1.4rem; font-weight: 800; color: var(--mango); }
    .price-sub { font-size: 0.75rem; color: rgba(255,255,255,0.5); }
    .tag {
      background: rgba(82,183,136,0.2); color: var(--green-light);
      padding: 4px 10px; border-radius: 50px;
      font-size: 0.75rem; font-weight: 600;
    }

    /* SECTION BASE */
    section { padding: 96px 5%; }
    .container { max-width: 1200px; margin: 0 auto; }
    .section-tag {
      display: inline-block;
      background: var(--green-pale); color: var(--green);
      padding: 6px 14px; border-radius: 50px;
      font-size: 0.78rem; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; margin-bottom: 16px;
    }
    .section-tag.orange {
      background: var(--mango-light); color: var(--mango-dark);
    }
    h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 3vw, 2.6rem);
      line-height: 1.25; margin-bottom: 16px;
    }
    .section-desc {
      font-size: 1.05rem; color: var(--gray);
      max-width: 600px; line-height: 1.8;
    }

    /* PROBLEM / OPPORTUNITY */
    .opportunity { background: var(--light); }
    .opp-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 60px;
      margin-top: 56px; align-items: start;
    }
    .opp-list { list-style: none; display: flex; flex-direction: column; gap: 20px; }
    .opp-item {
      display: flex; gap: 16px; align-items: flex-start;
      background: white; border-radius: 12px; padding: 20px;
      border: 1px solid var(--border);
    }
    .opp-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: var(--mango-light); display: flex;
      align-items: center; justify-content: center;
      font-size: 1.2rem; flex-shrink: 0;
    }
    .opp-item h4 { font-size: 0.95rem; font-weight: 700; margin-bottom: 4px; }
    .opp-item p { font-size: 0.85rem; color: var(--gray); }
    .market-numbers {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    }
    .market-num {
      background: white; border: 1px solid var(--border);
      border-radius: 12px; padding: 24px;
    }
    .market-num .big { font-size: 2rem; font-weight: 800; color: var(--green); margin-bottom: 4px; }
    .market-num p { font-size: 0.82rem; color: var(--gray); line-height: 1.5; }
    .market-num.accent { background: var(--green); }
    .market-num.accent .big { color: white; }
    .market-num.accent p { color: rgba(255,255,255,0.7); }

    /* PRODUCTS */
    .products-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px;
      margin-top: 56px;
    }
    .product-card {
      border: 1px solid var(--border); border-radius: 16px;
      overflow: hidden; transition: box-shadow 0.2s, transform 0.2s;
    }
    .product-card:hover { box-shadow: 0 12px 40px rgba(0,0,0,0.1); transform: translateY(-3px); }
    .product-img {
      height: 160px; display: flex; align-items: center;
      justify-content: center; font-size: 4rem;
    }
    .product-img.mango { background: linear-gradient(135deg, #FFF3DC, #FFD98E); }
    .product-img.pineapple { background: linear-gradient(135deg, #FFFBDC, #FFE97A); }
    .product-img.papaya { background: linear-gradient(135deg, #FFE8DC, #FFAB7A); }
    .product-img.banana { background: linear-gradient(135deg, #FFFFDC, #FFE97A); }
    .product-img.chili { background: linear-gradient(135deg, #FFDCDC, #FF7A7A); }
    .product-img.box { background: linear-gradient(135deg, #DCE8FF, #7AB8FF); }
    .product-body { padding: 20px; }
    .product-body h3 { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
    .product-body .sub { font-size: 0.82rem; color: var(--gray); margin-bottom: 12px; }
    .product-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .ptag {
      padding: 3px 9px; border-radius: 50px; font-size: 0.72rem; font-weight: 600;
    }
    .ptag.green { background: var(--green-pale); color: var(--green); }
    .ptag.orange { background: var(--mango-light); color: var(--mango-dark); }
    .ptag.blue { background: #EFF6FF; color: #1D4ED8; }
    .product-price { margin-top: 14px; font-size: 1.15rem; font-weight: 800; color: var(--dark); }
    .product-price span { font-size: 0.78rem; color: var(--gray); font-weight: 400; }

    /* BUSINESS MODEL */
    .model { background: var(--dark); color: white; }
    .model h2 { color: white; }
    .model .section-desc { color: rgba(255,255,255,0.65); }
    .model-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
      margin-top: 56px;
    }
    .model-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px; padding: 28px;
      transition: background 0.2s;
    }
    .model-card:hover { background: rgba(255,255,255,0.08); }
    .model-icon {
      font-size: 2rem; margin-bottom: 16px;
    }
    .model-card h3 { color: white; font-size: 1rem; font-weight: 700; margin-bottom: 8px; }
    .model-card p { color: rgba(255,255,255,0.55); font-size: 0.85rem; line-height: 1.7; }
    .model-card .highlight {
      margin-top: 16px; padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.08);
      color: var(--mango); font-size: 0.85rem; font-weight: 600;
    }

    /* FINANCIALS */
    .financials { background: var(--light); }
    .fin-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 48px;
      margin-top: 56px; align-items: start;
    }
    .fin-card {
      background: white; border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden;
    }
    .fin-card-header {
      background: var(--green); padding: 20px 24px;
      color: white;
    }
    .fin-card-header h3 { font-size: 1rem; font-weight: 700; }
    .fin-table { width: 100%; border-collapse: collapse; }
    .fin-table tr { border-bottom: 1px solid var(--border); }
    .fin-table tr:last-child { border: none; }
    .fin-table td { padding: 14px 24px; font-size: 0.88rem; }
    .fin-table td:last-child { text-align: right; font-weight: 700; color: var(--dark); }
    .fin-table tr.total { background: var(--mango-light); }
    .fin-table tr.total td { font-weight: 800; font-size: 0.9rem; color: var(--mango-dark); }
    .milestone-list { display: flex; flex-direction: column; gap: 0; }
    .milestone {
      display: flex; gap: 20px; padding: 20px 0;
      border-bottom: 1px solid var(--border);
    }
    .milestone:last-child { border: none; }
    .milestone-month {
      width: 80px; flex-shrink: 0;
      text-align: center;
    }
    .m-num {
      background: var(--mango); color: white;
      border-radius: 8px; padding: 6px 8px;
      font-size: 0.72rem; font-weight: 800;
      display: block; text-align: center;
    }
    .milestone h4 { font-size: 0.9rem; font-weight: 700; margin-bottom: 4px; }
    .milestone p { font-size: 0.82rem; color: var(--gray); }

    /* ROADMAP */
    .roadmap { background: white; }
    .roadmap-grid {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px;
      margin-top: 56px;
    }
    .phase {
      background: var(--light); border-radius: 14px; padding: 22px 16px;
      border: 2px solid transparent; transition: border-color 0.2s;
      position: relative;
    }
    .phase:hover { border-color: var(--mango); }
    .phase-num {
      font-size: 0.72rem; font-weight: 800; letter-spacing: 1px;
      color: var(--mango); text-transform: uppercase; margin-bottom: 8px;
    }
    .phase h4 { font-size: 0.9rem; font-weight: 700; margin-bottom: 8px; }
    .phase .month-badge {
      display: inline-block;
      background: var(--dark); color: white;
      padding: 3px 8px; border-radius: 5px;
      font-size: 0.7rem; font-weight: 600; margin-bottom: 12px;
    }
    .phase ul { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .phase ul li {
      font-size: 0.78rem; color: var(--gray);
      display: flex; gap: 6px; align-items: flex-start;
    }
    .phase ul li::before { content: '→'; color: var(--mango); font-weight: 700; flex-shrink: 0; }

    /* COMPETITIVE ADVANTAGE */
    .advantage { background: var(--dark2); color: white; }
    .advantage h2 { color: white; }
    .advantage .section-desc { color: rgba(255,255,255,0.65); }
    .adv-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;
      margin-top: 56px;
    }
    .adv-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px; padding: 28px;
      display: flex; gap: 18px;
    }
    .adv-icon {
      width: 44px; height: 44px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; flex-shrink: 0;
    }
    .adv-icon.yellow { background: rgba(245,166,35,0.15); }
    .adv-icon.green { background: rgba(82,183,136,0.15); }
    .adv-icon.blue { background: rgba(96,165,250,0.15); }
    .adv-icon.purple { background: rgba(167,139,250,0.15); }
    .adv-card h4 { color: white; font-size: 0.95rem; font-weight: 700; margin-bottom: 6px; }
    .adv-card p { color: rgba(255,255,255,0.5); font-size: 0.83rem; line-height: 1.7; }

    /* TEAM */
    .team { background: var(--light); }
    .team-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; margin-top: 56px; }
    .team-card {
      background: white; border: 1px solid var(--border);
      border-radius: 16px; padding: 28px;
      display: flex; gap: 20px; align-items: flex-start;
    }
    .avatar {
      width: 64px; height: 64px; border-radius: 50%;
      background: linear-gradient(135deg, var(--mango), var(--mango-dark));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; flex-shrink: 0; font-weight: 800; color: white;
    }
    .team-card h4 { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
    .team-card .role { font-size: 0.8rem; color: var(--mango); font-weight: 600; margin-bottom: 8px; }
    .team-card p { font-size: 0.83rem; color: var(--gray); line-height: 1.6; }

    /* INVEST */
    .invest {
      background: linear-gradient(135deg, var(--green) 0%, #1B4332 100%);
      color: white; text-align: center; padding: 96px 5%;
    }
    .invest h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 3.5vw, 3rem);
      color: white; margin-bottom: 16px;
    }
    .invest p { color: rgba(255,255,255,0.75); font-size: 1.05rem; max-width: 580px; margin: 0 auto 40px; }
    .invest-highlights {
      display: flex; justify-content: center; gap: 48px;
      flex-wrap: wrap; margin: 48px 0;
    }
    .invest-h { text-align: center; }
    .invest-h .big { font-size: 2.2rem; font-weight: 800; color: var(--mango); }
    .invest-h .lbl { font-size: 0.82rem; color: rgba(255,255,255,0.6); margin-top: 4px; }
    .invest-btns { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .btn-white {
      background: white; color: var(--green);
      padding: 15px 32px; border-radius: 10px;
      font-size: 1rem; font-weight: 700;
      text-decoration: none; transition: all 0.2s;
    }
    .btn-white:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
    .btn-outline-white {
      border: 2px solid rgba(255,255,255,0.4); color: white;
      padding: 15px 32px; border-radius: 10px;
      font-size: 1rem; font-weight: 600;
      text-decoration: none; transition: all 0.2s;
    }
    .btn-outline-white:hover { border-color: white; }

    /* CONTACT */
    .contact { background: white; }
    .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: start; margin-top: 48px; }
    .contact-info h3 { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
    .contact-info p { color: var(--gray); font-size: 0.9rem; margin-bottom: 28px; line-height: 1.7; }
    .contact-details { display: flex; flex-direction: column; gap: 16px; }
    .c-detail { display: flex; gap: 12px; align-items: center; font-size: 0.9rem; color: var(--dark); }
    .c-icon { font-size: 1.1rem; }
    .contact-form { background: var(--light); border-radius: 16px; padding: 32px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.83rem; font-weight: 600; margin-bottom: 6px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 11px 14px;
      border: 1px solid var(--border); border-radius: 8px;
      font-family: 'Inter', sans-serif; font-size: 0.9rem;
      color: var(--dark); background: white;
      transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none; border-color: var(--mango);
      box-shadow: 0 0 0 3px rgba(245,166,35,0.1);
    }
    .form-group textarea { min-height: 100px; resize: vertical; }
    .form-submit {
      width: 100%; background: var(--mango); color: white;
      border: none; padding: 13px; border-radius: 8px;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      transition: background 0.2s;
    }
    .form-submit:hover { background: var(--mango-dark); }

    /* FOOTER */
    footer {
      background: var(--dark); color: rgba(255,255,255,0.5);
      padding: 40px 5%; text-align: center;
    }
    footer .footer-logo {
      font-size: 1.3rem; font-weight: 800; color: white; margin-bottom: 8px;
    }
    footer .footer-logo span { color: var(--mango); }
    footer p { font-size: 0.83rem; }

    /* DIVIDER */
    .divider {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; margin: 8px 0;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: rgba(255,255,255,0.1);
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .hero-inner { grid-template-columns: 1fr; }
      .hero-visual { display: none; }
      .opp-grid, .fin-grid, .contact-grid, .team-grid, .adv-grid { grid-template-columns: 1fr; }
      .model-grid, .products-grid { grid-template-columns: 1fr 1fr; }
      .roadmap-grid { grid-template-columns: 1fr 1fr; }
      .market-numbers { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 600px) {
      .model-grid, .products-grid, .roadmap-grid { grid-template-columns: 1fr; }
      .nav-links { display: none; }
      .hero-stats { grid-template-columns: 1fr; }
      .invest-highlights { gap: 24px; }
    }
  </style>
</head>
<body>

<!-- NAVIGATION -->
<nav>
  <a href="#" class="nav-logo">
    <span class="icon">🥭</span>
    Tropi<span>Fruit</span>
  </a>
  <ul class="nav-links">
    <li><a href="#opportunity">Opportunity</a></li>
    <li><a href="#products">Products</a></li>
    <li><a href="#model">Business Model</a></li>
    <li><a href="#financials">Financials</a></li>
    <li><a href="#roadmap">Roadmap</a></li>
  </ul>
  <a href="#contact" class="nav-cta">Talk to Us →</a>
</nav>

<!-- HERO -->
<section class="hero" id="home">
  <div class="hero-inner">
    <div class="hero-content">
      <div class="hero-badge">🇵🇭 Philippines →
